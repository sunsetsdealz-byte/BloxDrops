<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="face-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ff66"/>
      <stop offset="100%" stop-color="#ccff00"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0098b0"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3380"/>
      <stop offset="100%" stop-color="#b3003d"/>
    </linearGradient>
    <radialGradient id="drop" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ccff00"/>
      <stop offset="100%" stop-color="#79a800"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark obsidian rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft ambient glow -->
  <circle cx="256" cy="280" r="170" fill="#ccff00" opacity="0.18" filter="url(#glow)"/>
  <circle cx="320" cy="320" r="110" fill="#00f0ff" opacity="0.12" filter="url(#glow)"/>

  <!-- Isometric cube (mark) — scaled and centered -->
  <g transform="translate(76, 76) scale(9)" filter="url(#glow)">
    <polygon points="20,4 35,12 20,20 5,12" fill="url(#face-top)"/>
    <polygon points="5,12 20,20 20,36 5,28" fill="url(#face-left)"/>
    <polygon points="35,12 20,20 20,36 35,28" fill="url(#face-right)"/>
    <polyline points="20,4 20,20 5,12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="0.6"/>
    <polyline points="20,20 35,12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
    <!-- Volt droplet emitting from top-right vertex -->
    <path d="M32 6 C 34 9, 35 11, 33 12.5 C 31 14, 30 10.5, 32 6 Z" fill="url(#drop)"/>
  </g>
</svg>
