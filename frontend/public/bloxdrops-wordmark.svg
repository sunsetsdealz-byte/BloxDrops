<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="face-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ff66"/>
      <stop offset="100%" stop-color="#ccff00"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0098b0"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3380"/>
      <stop offset="100%" stop-color="#b3003d"/>
    </linearGradient>
    <radialGradient id="drop" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ccff00"/>
      <stop offset="100%" stop-color="#79a800"/>
    </radialGradient>
    <linearGradient id="word-blox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <linearGradient id="word-drops" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ccff00"/>
      <stop offset="40%" stop-color="#e8ff66"/>
      <stop offset="80%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ccff00"/>
    </linearGradient>
  </defs>

  <!-- Isometric cube mark on the left -->
  <g transform="translate(40, 80) scale(4)">
    <polygon points="20,4 35,12 20,20 5,12" fill="url(#face-top)"/>
    <polygon points="5,12 20,20 20,36 5,28" fill="url(#face-left)"/>
    <polygon points="35,12 20,20 20,36 35,28" fill="url(#face-right)"/>
    <polyline points="20,4 20,20 5,12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="0.6"/>
    <polyline points="20,20 35,12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
    <path d="M32 6 C 34 9, 35 11, 33 12.5 C 31 14, 30 10.5, 32 6 Z" fill="url(#drop)"/>
  </g>

  <!-- BLOX wordmark -->
  <text x="240" y="218"
        font-family="Unbounded, 'Arial Black', sans-serif"
        font-weight="900"
        font-size="160"
        letter-spacing="-6"
        fill="url(#word-blox)">BLOX</text>

  <!-- Pulsing dot -->
  <circle cx="730" cy="170" r="18" fill="#ccff00"/>

  <!-- DROPS wordmark -->
  <text x="780" y="218"
        font-family="Unbounded, 'Arial Black', sans-serif"
        font-weight="900"
        font-size="160"
        letter-spacing="-6"
        fill="url(#word-drops)">DROPS</text>
</svg>
